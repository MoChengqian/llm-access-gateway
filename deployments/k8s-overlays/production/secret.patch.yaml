apiVersion: v1
kind: Secret
metadata:
  name: llm-access-gateway-secrets
  namespace: llm-access-gateway
type: Opaque
stringData:
  APP_MYSQL_DSN: "gateway_user:REPLACE_WITH_PASSWORD@tcp(mysql.production.svc.cluster.local:3306)/llm_access_gateway?parseTime=true"
  APP_REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD_OR_EMPTY"
  APP_PROVIDER_PRIMARY_API_KEY: "REPLACE_WITH_OPENAI_API_KEY"
  APP_PROVIDER_SECONDARY_API_KEY: "REPLACE_WITH_ANTHROPIC_API_KEY"
