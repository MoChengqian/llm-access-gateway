apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-access-gateway-config
  namespace: llm-access-gateway
data:
  APP_LOG_LEVEL: "info"
  APP_OBSERVABILITY_SERVICE_NAME: "llm-access-gateway"
  APP_OBSERVABILITY_OTLP_TRACES_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318/v1/traces"
  APP_OBSERVABILITY_OTLP_TRACES_INSECURE: "true"
  APP_OBSERVABILITY_OTLP_EXPORT_TIMEOUT_SECONDS: "5"
  APP_REDIS_ADDRESS: "redis.production.svc.cluster.local:6379"
  APP_REDIS_DB: "0"
  APP_GATEWAY_DEFAULT_MODEL: "gpt-4.1-mini"
  APP_GATEWAY_PROVIDER_FAILURE_THRESHOLD: "2"
  APP_GATEWAY_PROVIDER_COOLDOWN_SECONDS: "30"
  APP_GATEWAY_PROVIDER_PROBE_INTERVAL_SECONDS: "30"
  APP_PROVIDER_PRIMARY_TYPE: "openai"
  APP_PROVIDER_PRIMARY_NAME: "openai-primary"
  APP_PROVIDER_PRIMARY_PRIORITY: "100"
  APP_PROVIDER_PRIMARY_BASE_URL: "https://api.openai.com/v1"
  APP_PROVIDER_PRIMARY_MODEL: "gpt-4.1-mini"
  APP_PROVIDER_PRIMARY_MODELS: '["gpt-4.1-mini","gpt-4o-mini"]'
  APP_PROVIDER_PRIMARY_MAX_TOKENS: "1024"
  APP_PROVIDER_PRIMARY_TIMEOUT_SECONDS: "15"
  APP_PROVIDER_PRIMARY_MAX_RETRIES: "1"
  APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
  APP_PROVIDER_SECONDARY_TYPE: "anthropic"
  APP_PROVIDER_SECONDARY_NAME: "anthropic-secondary"
  APP_PROVIDER_SECONDARY_PRIORITY: "200"
  APP_PROVIDER_SECONDARY_BASE_URL: "https://api.anthropic.com/v1"
  APP_PROVIDER_SECONDARY_MODEL: "claude-3-5-sonnet-latest"
  APP_PROVIDER_SECONDARY_MODELS: '["claude-3-5-sonnet-latest"]'
  APP_PROVIDER_SECONDARY_MAX_TOKENS: "1024"
  APP_PROVIDER_SECONDARY_TIMEOUT_SECONDS: "20"
  APP_PROVIDER_SECONDARY_MAX_RETRIES: "1"
  APP_PROVIDER_SECONDARY_RETRY_BACKOFF_MILLISECONDS: "250"
