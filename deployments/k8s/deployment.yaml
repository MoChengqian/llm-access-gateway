apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-access-gateway
  namespace: llm-access-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-access-gateway
  template:
    metadata:
      labels:
        app: llm-access-gateway
    spec:
      containers:
        - name: gateway
          image: llm-access-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: llm-access-gateway-config
            - secretRef:
                name: llm-access-gateway-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
