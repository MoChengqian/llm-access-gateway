services:
  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.143.0}
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
      - "13133:13133"
      - "8888:8888"

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.9.1}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - otel-collector
    ports:
      - "${PROMETHEUS_HOST_PORT:-19090}:9090"

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.3.1}
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../grafana/dashboards:/var/lib/grafana/dashboards/llm-access-gateway:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
