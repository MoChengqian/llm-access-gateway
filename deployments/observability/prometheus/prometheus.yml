global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: llm-access-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
