# CI-based scanners read this file. SonarCloud Automatic Analysis reads
# .sonarcloud.properties, so keep both files in sync when changing scope.
#
# Synthetic upstreams are CI-only loopback fixtures. They intentionally serve
# plain HTTP so gateway fallback and streaming drills can run without external
# TLS fixtures.
sonar.exclusions=scripts/synthetic-openai-upstream.py,scripts/synthetic-anthropic-upstream.py

# Provider adapters intentionally share protocol-client scaffolding while each
# adapter preserves provider-specific request, stream, and error semantics.
# Governance persistence/concurrency tests intentionally share setup scaffolding
# so rate, token, and budget paths can be compared side by side.
sonar.cpd.exclusions=internal/provider/anthropic/chat.go,internal/provider/anthropic/chat_test.go,internal/provider/ollama/chat.go,internal/provider/ollama/chat_test.go,internal/provider/openai/chat.go,internal/provider/openai/chat_test.go,internal/provider/router/chat.go,internal/provider/router/chat_test.go,internal/store/mysql/governance_store.go,internal/service/governance/service_test.go
