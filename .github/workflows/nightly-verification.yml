name: nightly-verification

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Stage 7 static contract
        run: ./scripts/stage7-verify.sh static

  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: llm_access_gateway
          MYSQL_USER: user
          MYSQL_PASSWORD: pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uuser -ppass --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      APP_MYSQL_DSN: user:pass@tcp(127.0.0.1:3306)/llm_access_gateway?parseTime=true
      APP_REDIS_ADDRESS: 127.0.0.1:6379
      APP_SERVER_ADDRESS: 127.0.0.1:18080
      BASE_URL: http://127.0.0.1:18080
      API_KEY: lag-local-dev-key
      GATEWAY_BIN: /tmp/lag-gateway
      GOCACHE: /tmp/go-build
      GOMODCACHE: /tmp/go-mod
      ARTIFACT_DIR: /tmp/nightly-artifacts/benchmarks
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build gateway binary
        run: go build -o "${GATEWAY_BIN}" ./cmd/gateway

      - name: Prepare artifact directory
        run: mkdir -p "${ARTIFACT_DIR}"

      - name: Seed benchmark tenant limits
        run: |
          go run ./cmd/devinit -rpm-limit 1000 -tpm-limit 100000 -token-budget 1000000 | tee "${ARTIFACT_DIR}/seed-benchmark.txt"

      - name: Start gateway for mock provider benchmarks
        run: |
          nohup "${GATEWAY_BIN}" >"${ARTIFACT_DIR}/gateway-mock.log" 2>&1 &
          echo $! >/tmp/gateway.pid

          for i in $(seq 1 60); do
            if curl -fsS "${BASE_URL}/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "${ARTIFACT_DIR}/gateway-mock.log"
          exit 1

      - name: Run mock provider benchmarks
        run: |
          go run ./cmd/loadtest -url "${BASE_URL}/v1/chat/completions" -auth-key "${API_KEY}" -requests 100 -concurrency 10 -json -min-success-rate 1.0 | tee "${ARTIFACT_DIR}/mock-non-stream.json"
          go run ./cmd/loadtest -url "${BASE_URL}/v1/chat/completions" -auth-key "${API_KEY}" -requests 50 -concurrency 5 -stream -json -min-success-rate 1.0 | tee "${ARTIFACT_DIR}/mock-stream.json"
          curl -fsS "${BASE_URL}/metrics" >"${ARTIFACT_DIR}/mock-metrics.prom"
          curl -fsS "${BASE_URL}/debug/providers" >"${ARTIFACT_DIR}/mock-providers.json"

      - name: Stop mock benchmark gateway
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true

            for i in $(seq 1 30); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${gateway_pid}" 2>/dev/null; then
              kill -9 "${gateway_pid}" || true
              for i in $(seq 1 5); do
                if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          for i in $(seq 1 30); do
            if ! curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
            echo "mock benchmark gateway still serving ${BASE_URL} after shutdown" >&2
            test -f "${ARTIFACT_DIR}/gateway-mock.log" && cat "${ARTIFACT_DIR}/gateway-mock.log" || true
            exit 1
          fi

          rm -f /tmp/gateway.pid

      - name: Start synthetic upstream for adapter benchmarks
        run: |
          nohup python3 ./scripts/synthetic-openai-upstream.py --port 18081 --mode ok >"${ARTIFACT_DIR}/upstream-ok.log" 2>&1 &
          echo $! >/tmp/upstream.pid

          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "${ARTIFACT_DIR}/upstream-ok.log"
          exit 1

      - name: Start gateway for adapter benchmarks
        env:
          APP_PROVIDER_PRIMARY_TYPE: openai
          APP_PROVIDER_PRIMARY_NAME: openai-primary
          APP_PROVIDER_PRIMARY_BASE_URL: http://127.0.0.1:18081/v1
          APP_PROVIDER_PRIMARY_MODEL: gpt-4o-mini
          APP_PROVIDER_PRIMARY_TIMEOUT_SECONDS: "1"
          APP_PROVIDER_PRIMARY_MAX_RETRIES: "1"
          APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
        run: |
          nohup "${GATEWAY_BIN}" >"${ARTIFACT_DIR}/gateway-adapter.log" 2>&1 &
          echo $! >/tmp/gateway.pid

          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/gateway.pid)" 2>/dev/null; then
              cat "${ARTIFACT_DIR}/gateway-adapter.log"
              exit 1
            fi

            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              providers_json="$(curl -fsS "${BASE_URL}/debug/providers" 2>/dev/null || true)"
              if printf '%s' "${providers_json}" | grep -q '"name":"openai-primary"'; then
                printf '%s\n' "${providers_json}" >"${ARTIFACT_DIR}/gateway-adapter-start-providers.json"
                exit 0
              fi
            fi

            if grep -q 'address already in use' "${ARTIFACT_DIR}/gateway-adapter.log"; then
              cat "${ARTIFACT_DIR}/gateway-adapter.log"
              exit 1
            fi

            sleep 1
          done

          cat "${ARTIFACT_DIR}/gateway-adapter.log"
          test -f "${ARTIFACT_DIR}/gateway-adapter-start-providers.json" && cat "${ARTIFACT_DIR}/gateway-adapter-start-providers.json" || true
          exit 1

      - name: Run adapter benchmarks
        run: |
          go run ./cmd/loadtest -url "${BASE_URL}/v1/chat/completions" -auth-key "${API_KEY}" -model gpt-4o-mini -requests 100 -concurrency 10 -json -min-success-rate 1.0 | tee "${ARTIFACT_DIR}/adapter-non-stream.json"
          go run ./cmd/loadtest -url "${BASE_URL}/v1/chat/completions" -auth-key "${API_KEY}" -model gpt-4o-mini -requests 50 -concurrency 5 -stream -json -min-success-rate 1.0 | tee "${ARTIFACT_DIR}/adapter-stream.json"
          curl -fsS "${BASE_URL}/metrics" >"${ARTIFACT_DIR}/adapter-metrics.prom"
          curl -fsS "${BASE_URL}/debug/providers" >"${ARTIFACT_DIR}/adapter-providers.json"

      - name: Check benchmark regression thresholds
        run: |
          go run ./cmd/nightlycheck \
            -mode benchmarks \
            -mock-non-stream "${ARTIFACT_DIR}/mock-non-stream.json" \
            -mock-stream "${ARTIFACT_DIR}/mock-stream.json" \
            -adapter-non-stream "${ARTIFACT_DIR}/adapter-non-stream.json" \
            -adapter-stream "${ARTIFACT_DIR}/adapter-stream.json"

      - name: Restore default development tenant limits
        if: always()
        run: |
          go run ./cmd/devinit | tee "${ARTIFACT_DIR}/seed-default.txt"

      - name: Dump benchmark logs on failure
        if: failure()
        run: |
          test -f "${ARTIFACT_DIR}/gateway-mock.log" && cat "${ARTIFACT_DIR}/gateway-mock.log" || true
          test -f "${ARTIFACT_DIR}/gateway-adapter.log" && cat "${ARTIFACT_DIR}/gateway-adapter.log" || true
          test -f "${ARTIFACT_DIR}/upstream-ok.log" && cat "${ARTIFACT_DIR}/upstream-ok.log" || true

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-benchmarks
          path: /tmp/nightly-artifacts/benchmarks
          if-no-files-found: error

      - name: Stop background processes
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true
            for i in $(seq 1 10); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${gateway_pid}" 2>/dev/null || true
          fi
          if test -f /tmp/upstream.pid; then
            upstream_pid="$(cat /tmp/upstream.pid)"
            kill "${upstream_pid}" || true
            for i in $(seq 1 10); do
              if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${upstream_pid}" 2>/dev/null || true
          fi

  stream-failure-drills:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: llm_access_gateway
          MYSQL_USER: user
          MYSQL_PASSWORD: pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uuser -ppass --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      APP_MYSQL_DSN: user:pass@tcp(127.0.0.1:3306)/llm_access_gateway?parseTime=true
      APP_REDIS_ADDRESS: 127.0.0.1:6379
      APP_SERVER_ADDRESS: 127.0.0.1:18080
      BASE_URL: http://127.0.0.1:18080
      API_KEY: lag-local-dev-key
      GATEWAY_BIN: /tmp/lag-gateway
      GOCACHE: /tmp/go-build
      GOMODCACHE: /tmp/go-mod
      ARTIFACT_DIR: /tmp/nightly-artifacts/streaming-failures
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build gateway binary
        run: go build -o "${GATEWAY_BIN}" ./cmd/gateway

      - name: Prepare artifact directory
        run: mkdir -p "${ARTIFACT_DIR}"

      - name: Seed default development tenant
        run: go run ./cmd/devinit | tee "${ARTIFACT_DIR}/seed-default.txt"

      - name: Start synthetic upstream for pre-chunk failure scenario
        run: |
          nohup python3 ./scripts/synthetic-openai-upstream.py --port 18081 --mode stream_prechunk_fail >"${ARTIFACT_DIR}/upstream-prechunk.log" 2>&1 &
          echo $! >/tmp/upstream.pid

          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "${ARTIFACT_DIR}/upstream-prechunk.log"
          exit 1

      - name: Start gateway for pre-chunk failure scenario
        env:
          APP_GATEWAY_PROVIDER_PROBE_INTERVAL_SECONDS: "0"
          APP_PROVIDER_PRIMARY_TYPE: openai
          APP_PROVIDER_PRIMARY_NAME: openai-primary
          APP_PROVIDER_PRIMARY_BASE_URL: http://127.0.0.1:18081/v1
          APP_PROVIDER_PRIMARY_MODEL: gpt-4o-mini
          APP_PROVIDER_PRIMARY_TIMEOUT_SECONDS: "1"
          APP_PROVIDER_PRIMARY_MAX_RETRIES: "1"
          APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
        run: |
          nohup "${GATEWAY_BIN}" >"${ARTIFACT_DIR}/gateway-prechunk.log" 2>&1 &
          echo $! >/tmp/gateway.pid

          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/gateway.pid)" 2>/dev/null; then
              cat "${ARTIFACT_DIR}/gateway-prechunk.log"
              exit 1
            fi

            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              providers_json="$(curl -fsS "${BASE_URL}/debug/providers" 2>/dev/null || true)"
              if printf '%s' "${providers_json}" | grep -q '"name":"openai-primary"'; then
                printf '%s\n' "${providers_json}" >"${ARTIFACT_DIR}/gateway-prechunk-start-providers.json"
                exit 0
              fi
            fi

            if grep -q 'address already in use' "${ARTIFACT_DIR}/gateway-prechunk.log"; then
              cat "${ARTIFACT_DIR}/gateway-prechunk.log"
              exit 1
            fi

            sleep 1
          done

          cat "${ARTIFACT_DIR}/gateway-prechunk.log"
          test -f "${ARTIFACT_DIR}/gateway-prechunk-start-providers.json" && cat "${ARTIFACT_DIR}/gateway-prechunk-start-providers.json" || true
          exit 1

      - name: Run pre-chunk failure drill
        run: |
          ./scripts/provider-fallback-drill.sh stream-fail | tee "${ARTIFACT_DIR}/prechunk.out"
          curl -fsS "${BASE_URL}/metrics" >"${ARTIFACT_DIR}/prechunk-metrics.prom"
          curl -fsS "${BASE_URL}/debug/providers" >"${ARTIFACT_DIR}/prechunk-providers.json"

      - name: Stop pre-chunk processes
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true

            for i in $(seq 1 30); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${gateway_pid}" 2>/dev/null; then
              kill -9 "${gateway_pid}" || true
              for i in $(seq 1 5); do
                if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          if test -f /tmp/upstream.pid; then
            upstream_pid="$(cat /tmp/upstream.pid)"
            kill "${upstream_pid}" || true

            for i in $(seq 1 30); do
              if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${upstream_pid}" 2>/dev/null; then
              kill -9 "${upstream_pid}" || true
              for i in $(seq 1 5); do
                if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          for i in $(seq 1 30); do
            gateway_down=true
            upstream_down=true
            curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1 && gateway_down=false
            curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null 2>&1 && upstream_down=false
            if $gateway_down && $upstream_down; then
              break
            fi
            sleep 1
          done

          if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
            echo "pre-chunk gateway still serving ${BASE_URL} after shutdown" >&2
            test -f "${ARTIFACT_DIR}/gateway-prechunk.log" && cat "${ARTIFACT_DIR}/gateway-prechunk.log" || true
            exit 1
          fi
          if curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null 2>&1; then
            echo "pre-chunk upstream still serving http://127.0.0.1:18081 after shutdown" >&2
            test -f "${ARTIFACT_DIR}/upstream-prechunk.log" && cat "${ARTIFACT_DIR}/upstream-prechunk.log" || true
            exit 1
          fi

          rm -f /tmp/gateway.pid /tmp/upstream.pid

      - name: Start synthetic upstream for partial stream scenario
        run: |
          nohup python3 ./scripts/synthetic-openai-upstream.py --port 18081 --mode stream_partial >"${ARTIFACT_DIR}/upstream-partial.log" 2>&1 &
          echo $! >/tmp/upstream.pid

          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "${ARTIFACT_DIR}/upstream-partial.log"
          exit 1

      - name: Start gateway for partial stream scenario
        env:
          APP_GATEWAY_PROVIDER_PROBE_INTERVAL_SECONDS: "0"
          APP_PROVIDER_PRIMARY_TYPE: openai
          APP_PROVIDER_PRIMARY_NAME: openai-primary
          APP_PROVIDER_PRIMARY_BASE_URL: http://127.0.0.1:18081/v1
          APP_PROVIDER_PRIMARY_MODEL: gpt-4o-mini
          APP_PROVIDER_PRIMARY_TIMEOUT_SECONDS: "1"
          APP_PROVIDER_PRIMARY_MAX_RETRIES: "1"
          APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
        run: |
          nohup "${GATEWAY_BIN}" >"${ARTIFACT_DIR}/gateway-partial.log" 2>&1 &
          echo $! >/tmp/gateway.pid

          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/gateway.pid)" 2>/dev/null; then
              cat "${ARTIFACT_DIR}/gateway-partial.log"
              exit 1
            fi

            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              providers_json="$(curl -fsS "${BASE_URL}/debug/providers" 2>/dev/null || true)"
              if printf '%s' "${providers_json}" | grep -q '"name":"openai-primary"'; then
                printf '%s\n' "${providers_json}" >"${ARTIFACT_DIR}/gateway-partial-start-providers.json"
                exit 0
              fi
            fi

            if grep -q 'address already in use' "${ARTIFACT_DIR}/gateway-partial.log"; then
              cat "${ARTIFACT_DIR}/gateway-partial.log"
              exit 1
            fi

            sleep 1
          done

          cat "${ARTIFACT_DIR}/gateway-partial.log"
          test -f "${ARTIFACT_DIR}/gateway-partial-start-providers.json" && cat "${ARTIFACT_DIR}/gateway-partial-start-providers.json" || true
          exit 1

      - name: Run partial stream scenario
        run: |
          curl -i -sS -N "${BASE_URL}/v1/chat/completions" \
            -H "Authorization: Bearer ${API_KEY}" \
            -H 'Content-Type: application/json' \
            -d '{"model":"gpt-4o-mini","messages":[{"role":"user","content":"hello"}],"stream":true}' | tee "${ARTIFACT_DIR}/partial.out"
          curl -fsS "${BASE_URL}/metrics" >"${ARTIFACT_DIR}/partial-metrics.prom"
          curl -fsS "${BASE_URL}/debug/providers" >"${ARTIFACT_DIR}/partial-providers.json"

      - name: Check streaming failure regression expectations
        run: |
          go run ./cmd/nightlycheck \
            -mode stream-failures \
            -prechunk-output "${ARTIFACT_DIR}/prechunk.out" \
            -prechunk-metrics "${ARTIFACT_DIR}/prechunk-metrics.prom" \
            -partial-output "${ARTIFACT_DIR}/partial.out" \
            -partial-metrics "${ARTIFACT_DIR}/partial-metrics.prom"

      - name: Dump stream drill logs on failure
        if: failure()
        run: |
          test -f "${ARTIFACT_DIR}/gateway-prechunk.log" && cat "${ARTIFACT_DIR}/gateway-prechunk.log" || true
          test -f "${ARTIFACT_DIR}/gateway-partial.log" && cat "${ARTIFACT_DIR}/gateway-partial.log" || true
          test -f "${ARTIFACT_DIR}/upstream-prechunk.log" && cat "${ARTIFACT_DIR}/upstream-prechunk.log" || true
          test -f "${ARTIFACT_DIR}/upstream-partial.log" && cat "${ARTIFACT_DIR}/upstream-partial.log" || true

      - name: Upload streaming drill artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-stream-failure-drills
          path: /tmp/nightly-artifacts/streaming-failures
          if-no-files-found: error

      - name: Stop background processes
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true
            for i in $(seq 1 10); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${gateway_pid}" 2>/dev/null || true
          fi
          if test -f /tmp/upstream.pid; then
            upstream_pid="$(cat /tmp/upstream.pid)"
            kill "${upstream_pid}" || true
            for i in $(seq 1 10); do
              if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${upstream_pid}" 2>/dev/null || true
          fi

