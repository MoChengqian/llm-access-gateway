          APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
        run: |
          nohup "${GATEWAY_BIN}" >"${ARTIFACT_DIR}/gateway-system.log" 2>&1 &
          echo $! >/tmp/gateway.pid

          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/gateway.pid)" 2>/dev/null; then
              cat "${ARTIFACT_DIR}/gateway-system.log"
              exit 1
            fi

            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              providers_json="$(curl -fsS "${BASE_URL}/debug/providers" 2>/dev/null || true)"
              if printf '%s' "${providers_json}" | grep -q '"name":"anthropic-primary"'; then
                printf '%s\n' "${providers_json}" >"${ARTIFACT_DIR}/gateway-system-start-providers.json"
                exit 0
              fi
            fi

            if grep -q 'address already in use' "${ARTIFACT_DIR}/gateway-system.log"; then
              cat "${ARTIFACT_DIR}/gateway-system.log"
              exit 1
            fi

            sleep 1
          done

          cat "${ARTIFACT_DIR}/gateway-system.log"
          test -f "${ARTIFACT_DIR}/gateway-system-start-providers.json" && cat "${ARTIFACT_DIR}/gateway-system-start-providers.json" || true
          exit 1

      - name: Run system prompt translation drill
        run: |
          ./scripts/anthropic-adapter-drill.sh system-prompt | tee "${ARTIFACT_DIR}/system.out"
          curl -fsS "${UPSTREAM_BASE_URL}/debug/last-request" >"${ARTIFACT_DIR}/upstream-request.json"

      - name: Stop system prompt processes
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true

            for i in $(seq 1 30); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${gateway_pid}" 2>/dev/null; then
              kill -9 "${gateway_pid}" || true
              for i in $(seq 1 5); do
                if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          if test -f /tmp/upstream.pid; then
            upstream_pid="$(cat /tmp/upstream.pid)"
            kill "${upstream_pid}" || true

            for i in $(seq 1 30); do
              if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${upstream_pid}" 2>/dev/null; then
              kill -9 "${upstream_pid}" || true
              for i in $(seq 1 5); do
                if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          for i in $(seq 1 30); do
            gateway_down=true
            upstream_down=true
            curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1 && gateway_down=false
            curl -fsS "${UPSTREAM_BASE_URL}/healthz" >/dev/null 2>&1 && upstream_down=false
            if $gateway_down && $upstream_down; then
              break
            fi
            sleep 1
          done

          if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
            echo "system prompt gateway still serving ${BASE_URL} after shutdown" >&2
            test -f "${ARTIFACT_DIR}/gateway-system.log" && cat "${ARTIFACT_DIR}/gateway-system.log" || true
            exit 1
          fi
          if curl -fsS "${UPSTREAM_BASE_URL}/healthz" >/dev/null 2>&1; then
            echo "system prompt upstream still serving ${UPSTREAM_BASE_URL} after shutdown" >&2
            test -f "${ARTIFACT_DIR}/upstream-system.log" && cat "${ARTIFACT_DIR}/upstream-system.log" || true
            exit 1
          fi

          rm -f /tmp/gateway.pid /tmp/upstream.pid

      - name: Start synthetic Anthropic upstream for pre-chunk failure scenario
        run: |
          nohup python3 ./scripts/synthetic-anthropic-upstream.py --port 18081 --mode stream_prechunk_fail >"${ARTIFACT_DIR}/upstream-prechunk.log" 2>&1 &
          echo $! >/tmp/upstream.pid

          for i in $(seq 1 30); do
            if curl -fsS "${UPSTREAM_BASE_URL}/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "${ARTIFACT_DIR}/upstream-prechunk.log"
          exit 1

      - name: Start gateway for Anthropic pre-chunk failure scenario
        env:
          APP_GATEWAY_PROVIDER_PROBE_INTERVAL_SECONDS: "0"
          APP_GATEWAY_DEFAULT_MODEL: claude-3-5-sonnet-latest
          APP_PROVIDER_PRIMARY_TYPE: anthropic
          APP_PROVIDER_PRIMARY_NAME: anthropic-primary
          APP_PROVIDER_PRIMARY_BASE_URL: http://127.0.0.1:18081/v1
          APP_PROVIDER_PRIMARY_API_KEY: sk-ant-nightly
          APP_PROVIDER_PRIMARY_MODEL: claude-3-5-sonnet-latest
          APP_PROVIDER_PRIMARY_MAX_TOKENS: "1024"
          APP_PROVIDER_PRIMARY_TIMEOUT_SECONDS: "1"
          APP_PROVIDER_PRIMARY_MAX_RETRIES: "1"
          APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
        run: |
          nohup "${GATEWAY_BIN}" >"${ARTIFACT_DIR}/gateway-prechunk.log" 2>&1 &
          echo $! >/tmp/gateway.pid

          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/gateway.pid)" 2>/dev/null; then
              cat "${ARTIFACT_DIR}/gateway-prechunk.log"
              exit 1
            fi

            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              providers_json="$(curl -fsS "${BASE_URL}/debug/providers" 2>/dev/null || true)"
              if printf '%s' "${providers_json}" | grep -q '"name":"anthropic-primary"'; then
                printf '%s\n' "${providers_json}" >"${ARTIFACT_DIR}/gateway-prechunk-start-providers.json"
                exit 0
              fi
            fi

            if grep -q 'address already in use' "${ARTIFACT_DIR}/gateway-prechunk.log"; then
              cat "${ARTIFACT_DIR}/gateway-prechunk.log"
              exit 1
            fi

            sleep 1
          done

          cat "${ARTIFACT_DIR}/gateway-prechunk.log"
          test -f "${ARTIFACT_DIR}/gateway-prechunk-start-providers.json" && cat "${ARTIFACT_DIR}/gateway-prechunk-start-providers.json" || true
          exit 1

      - name: Run Anthropic pre-chunk failure drill
        run: |
          ./scripts/provider-fallback-drill.sh stream-fail | tee "${ARTIFACT_DIR}/prechunk.out"
          curl -fsS "${BASE_URL}/metrics" >"${ARTIFACT_DIR}/prechunk-metrics.prom"
          curl -fsS "${BASE_URL}/debug/providers" >"${ARTIFACT_DIR}/prechunk-providers.json"

      - name: Stop Anthropic pre-chunk processes
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true

            for i in $(seq 1 30); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${gateway_pid}" 2>/dev/null; then
              kill -9 "${gateway_pid}" || true
              for i in $(seq 1 5); do
                if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          if test -f /tmp/upstream.pid; then
            upstream_pid="$(cat /tmp/upstream.pid)"
            kill "${upstream_pid}" || true

            for i in $(seq 1 30); do
              if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${upstream_pid}" 2>/dev/null; then
              kill -9 "${upstream_pid}" || true
              for i in $(seq 1 5); do
                if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          for i in $(seq 1 30); do
            gateway_down=true
            upstream_down=true
            curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1 && gateway_down=false
            curl -fsS "${UPSTREAM_BASE_URL}/healthz" >/dev/null 2>&1 && upstream_down=false
            if $gateway_down && $upstream_down; then
              break
            fi
            sleep 1
          done

          if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
            echo "Anthropic pre-chunk gateway still serving ${BASE_URL} after shutdown" >&2
            test -f "${ARTIFACT_DIR}/gateway-prechunk.log" && cat "${ARTIFACT_DIR}/gateway-prechunk.log" || true
            exit 1
          fi
          if curl -fsS "${UPSTREAM_BASE_URL}/healthz" >/dev/null 2>&1; then
            echo "Anthropic pre-chunk upstream still serving ${UPSTREAM_BASE_URL} after shutdown" >&2
            test -f "${ARTIFACT_DIR}/upstream-prechunk.log" && cat "${ARTIFACT_DIR}/upstream-prechunk.log" || true
            exit 1
          fi

          rm -f /tmp/gateway.pid /tmp/upstream.pid

      - name: Start synthetic Anthropic upstream for partial stream scenario
        run: |
          nohup python3 ./scripts/synthetic-anthropic-upstream.py --port 18081 --mode stream_partial >"${ARTIFACT_DIR}/upstream-partial.log" 2>&1 &
          echo $! >/tmp/upstream.pid

          for i in $(seq 1 30); do
            if curl -fsS "${UPSTREAM_BASE_URL}/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "${ARTIFACT_DIR}/upstream-partial.log"
          exit 1

      - name: Start gateway for Anthropic partial stream scenario
        env:
          APP_GATEWAY_PROVIDER_PROBE_INTERVAL_SECONDS: "0"
          APP_GATEWAY_DEFAULT_MODEL: claude-3-5-sonnet-latest
          APP_PROVIDER_PRIMARY_TYPE: anthropic
          APP_PROVIDER_PRIMARY_NAME: anthropic-primary
          APP_PROVIDER_PRIMARY_BASE_URL: http://127.0.0.1:18081/v1
          APP_PROVIDER_PRIMARY_API_KEY: sk-ant-nightly
          APP_PROVIDER_PRIMARY_MODEL: claude-3-5-sonnet-latest
          APP_PROVIDER_PRIMARY_MAX_TOKENS: "1024"
          APP_PROVIDER_PRIMARY_TIMEOUT_SECONDS: "1"
          APP_PROVIDER_PRIMARY_MAX_RETRIES: "1"
          APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
        run: |
          nohup "${GATEWAY_BIN}" >"${ARTIFACT_DIR}/gateway-partial.log" 2>&1 &
          echo $! >/tmp/gateway.pid

          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/gateway.pid)" 2>/dev/null; then
              cat "${ARTIFACT_DIR}/gateway-partial.log"
              exit 1
            fi

            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              providers_json="$(curl -fsS "${BASE_URL}/debug/providers" 2>/dev/null || true)"
              if printf '%s' "${providers_json}" | grep -q '"name":"anthropic-primary"'; then
                printf '%s\n' "${providers_json}" >"${ARTIFACT_DIR}/gateway-partial-start-providers.json"
                exit 0
              fi
            fi

            if grep -q 'address already in use' "${ARTIFACT_DIR}/gateway-partial.log"; then
              cat "${ARTIFACT_DIR}/gateway-partial.log"
              exit 1
            fi

            sleep 1
          done

          cat "${ARTIFACT_DIR}/gateway-partial.log"
          test -f "${ARTIFACT_DIR}/gateway-partial-start-providers.json" && cat "${ARTIFACT_DIR}/gateway-partial-start-providers.json" || true
          exit 1

      - name: Run Anthropic partial stream scenario
        run: |
          ./scripts/anthropic-adapter-drill.sh partial-stream | tee "${ARTIFACT_DIR}/partial.out"
          curl -fsS "${BASE_URL}/metrics" >"${ARTIFACT_DIR}/partial-metrics.prom"
          curl -fsS "${BASE_URL}/debug/providers" >"${ARTIFACT_DIR}/partial-providers.json"

      - name: Check Anthropic adapter regression expectations
        run: |
          go run ./cmd/nightlycheck \
            -mode anthropic-adapter \
            -system-output "${ARTIFACT_DIR}/system.out" \
            -upstream-request "${ARTIFACT_DIR}/upstream-request.json" \
            -prechunk-output "${ARTIFACT_DIR}/prechunk.out" \
            -prechunk-metrics "${ARTIFACT_DIR}/prechunk-metrics.prom" \
            -partial-output "${ARTIFACT_DIR}/partial.out" \
            -partial-metrics "${ARTIFACT_DIR}/partial-metrics.prom" \
            -primary-backend anthropic-primary \
            -partial-output-needle "anthropic partial "

      - name: Dump Anthropic drill logs on failure
        if: failure()
        run: |
          test -f "${ARTIFACT_DIR}/gateway-system.log" && cat "${ARTIFACT_DIR}/gateway-system.log" || true
          test -f "${ARTIFACT_DIR}/gateway-prechunk.log" && cat "${ARTIFACT_DIR}/gateway-prechunk.log" || true
          test -f "${ARTIFACT_DIR}/gateway-partial.log" && cat "${ARTIFACT_DIR}/gateway-partial.log" || true
          test -f "${ARTIFACT_DIR}/upstream-system.log" && cat "${ARTIFACT_DIR}/upstream-system.log" || true
          test -f "${ARTIFACT_DIR}/upstream-prechunk.log" && cat "${ARTIFACT_DIR}/upstream-prechunk.log" || true
          test -f "${ARTIFACT_DIR}/upstream-partial.log" && cat "${ARTIFACT_DIR}/upstream-partial.log" || true

      - name: Upload Anthropic drill artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-anthropic-adapter
          path: /tmp/nightly-artifacts/anthropic-adapter
          if-no-files-found: error

      - name: Stop background processes
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true
            for i in $(seq 1 10); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${gateway_pid}" 2>/dev/null || true
          fi
          if test -f /tmp/upstream.pid; then
            upstream_pid="$(cat /tmp/upstream.pid)"
            kill "${upstream_pid}" || true
            for i in $(seq 1 10); do
              if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${upstream_pid}" 2>/dev/null || true
          fi

  report:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - benchmarks
      - stream-failure-drills
      - anthropic-adapter-drills
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download benchmark artifacts
        if: needs.benchmarks.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: nightly-benchmarks
          path: /tmp/nightly-artifacts/benchmarks

      - name: Download streaming drill artifacts
        if: needs['stream-failure-drills'].result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: nightly-stream-failure-drills
          path: /tmp/nightly-artifacts/streaming-failures

      - name: Download Anthropic drill artifacts
        if: needs['anthropic-adapter-drills'].result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: nightly-anthropic-adapter
          path: /tmp/nightly-artifacts/anthropic-adapter

      - name: Generate markdown summary
        if: always()
        run: |
          report_path=/tmp/nightly-artifacts/report/nightly-summary.md
          missing=0
          prerequisite_failed=0
          report_failed=0
          missing_files=""

          require_file() {
            path="$1"
            if ! test -f "${path}"; then
              missing=1
              missing_files="${missing_files}- ${path}\n"
            fi
          }

          if [ "${{ needs.test.result }}" != "success" ] ||
             [ "${{ needs.benchmarks.result }}" != "success" ] ||
             [ "${{ needs['stream-failure-drills'].result }}" != "success" ] ||
             [ "${{ needs['anthropic-adapter-drills'].result }}" != "success" ]; then
            prerequisite_failed=1
          fi

          if [ "${{ needs.benchmarks.result }}" = "success" ]; then
            require_file /tmp/nightly-artifacts/benchmarks/mock-non-stream.json
            require_file /tmp/nightly-artifacts/benchmarks/mock-stream.json
            require_file /tmp/nightly-artifacts/benchmarks/adapter-non-stream.json
            require_file /tmp/nightly-artifacts/benchmarks/adapter-stream.json
          fi
          if [ "${{ needs['stream-failure-drills'].result }}" = "success" ]; then
            require_file /tmp/nightly-artifacts/streaming-failures/prechunk.out
            require_file /tmp/nightly-artifacts/streaming-failures/prechunk-metrics.prom
            require_file /tmp/nightly-artifacts/streaming-failures/partial.out
            require_file /tmp/nightly-artifacts/streaming-failures/partial-metrics.prom
          fi
          if [ "${{ needs['anthropic-adapter-drills'].result }}" = "success" ]; then
            require_file /tmp/nightly-artifacts/anthropic-adapter/system.out
            require_file /tmp/nightly-artifacts/anthropic-adapter/upstream-request.json
            require_file /tmp/nightly-artifacts/anthropic-adapter/prechunk.out
            require_file /tmp/nightly-artifacts/anthropic-adapter/prechunk-metrics.prom
            require_file /tmp/nightly-artifacts/anthropic-adapter/partial.out
            require_file /tmp/nightly-artifacts/anthropic-adapter/partial-metrics.prom
          fi

          if [ "${prerequisite_failed}" -eq 0 ] && [ "${missing}" -eq 0 ]; then
            if ! go run ./cmd/nightlyreport \
              -baseline .github/nightly/benchmark-baseline.json \
              -mock-non-stream /tmp/nightly-artifacts/benchmarks/mock-non-stream.json \
              -mock-stream /tmp/nightly-artifacts/benchmarks/mock-stream.json \
              -adapter-non-stream /tmp/nightly-artifacts/benchmarks/adapter-non-stream.json \
              -adapter-stream /tmp/nightly-artifacts/benchmarks/adapter-stream.json \
              -prechunk-output /tmp/nightly-artifacts/streaming-failures/prechunk.out \
              -prechunk-metrics /tmp/nightly-artifacts/streaming-failures/prechunk-metrics.prom \
              -partial-output /tmp/nightly-artifacts/streaming-failures/partial.out \
              -partial-metrics /tmp/nightly-artifacts/streaming-failures/partial-metrics.prom \
              -anthropic-system-output /tmp/nightly-artifacts/anthropic-adapter/system.out \
              -anthropic-upstream-request /tmp/nightly-artifacts/anthropic-adapter/upstream-request.json \
              -anthropic-prechunk-output /tmp/nightly-artifacts/anthropic-adapter/prechunk.out \
              -anthropic-prechunk-metrics /tmp/nightly-artifacts/anthropic-adapter/prechunk-metrics.prom \
              -anthropic-partial-output /tmp/nightly-artifacts/anthropic-adapter/partial.out \
              -anthropic-partial-metrics /tmp/nightly-artifacts/anthropic-adapter/partial-metrics.prom \
              -output "${report_path}"; then
              report_failed=1
            fi
          fi

          if ! test -f "${report_path}"; then
            mkdir -p "$(dirname "${report_path}")"
            {
              echo "# Nightly Verification Summary"
              echo
              if [ "${prerequisite_failed}" -ne 0 ]; then
                echo "Summary generation was degraded because one or more prerequisite jobs did not complete successfully."
              elif [ "${missing}" -ne 0 ]; then
                echo "Summary generation was degraded because a successful prerequisite job did not publish every expected artifact."
              else
                echo "Summary generation failed even though all prerequisite artifacts were present."
              fi
              echo
              echo "## Job Results"
              echo
              echo "- test: ${{ needs.test.result }}"
              echo "- benchmarks: ${{ needs.benchmarks.result }}"
              echo "- stream-failure-drills: ${{ needs['stream-failure-drills'].result }}"
              echo "- anthropic-adapter-drills: ${{ needs['anthropic-adapter-drills'].result }}"
              if [ -n "${missing_files}" ]; then
                echo
                echo "## Missing Artifacts"
                printf '%b' "${missing_files}"
              fi
            } >"${report_path}"
          fi
          cat "${report_path}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${report_failed}" -ne 0 ]; then
            exit 1
          fi

      - name: Upload nightly summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-summary
          path: /tmp/nightly-artifacts/report/nightly-summary.md
          if-no-files-found: error
