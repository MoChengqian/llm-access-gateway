name: runtime-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/go-build
      GOMODCACHE: /tmp/go-mod
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Warm Go module cache
        run: |
          for attempt in 1 2 3; do
            if go mod download; then
              exit 0
            fi

            echo "go mod download failed on attempt ${attempt}; retrying." >&2
            sleep $((attempt * 2))
          done

          exit 1

      - name: Verify Kubernetes production overlay render
        run: |
          kubectl version --client=true
          make k8s-production-render >/tmp/k8s-production-overlay.yaml
          test -s /tmp/k8s-production-overlay.yaml
          make k8s-production-hpa-render >/tmp/k8s-production-hpa-overlay.yaml
          test -s /tmp/k8s-production-hpa-overlay.yaml

      - name: Stage 7 Go environment
        env:
          REQUIRE_K8S_PRODUCTION_RENDER: "true"
        run: ./scripts/stage7-verify.sh static-go-env

      - name: Stage 7 Go tests
        env:
          REQUIRE_K8S_PRODUCTION_RENDER: "true"
        run: ./scripts/stage7-verify.sh static-go-test

      - name: Stage 7 Go vet
        env:
          REQUIRE_K8S_PRODUCTION_RENDER: "true"
        run: ./scripts/stage7-verify.sh static-go-vet

      - name: Stage 7 deployment validation
        env:
          REQUIRE_K8S_PRODUCTION_RENDER: "true"
        run: ./scripts/stage7-verify.sh static-deployments

      - name: Stage 7 dashboard validation
        env:
          REQUIRE_K8S_PRODUCTION_RENDER: "true"
        run: ./scripts/stage7-verify.sh static-dashboard

      - name: Stage 7 asset inventory
        env:
          REQUIRE_K8S_PRODUCTION_RENDER: "true"
        run: ./scripts/stage7-verify.sh static-assets

      - name: Dump Stage 7 static diagnostics
        if: failure()
        env:
          REQUIRE_K8S_PRODUCTION_RENDER: "true"
        run: |
          echo "Stage 7 static contract failed; rerunning with shell trace for diagnostics."
          bash -x ./scripts/stage7-verify.sh static || true

  runtime:
    runs-on: ubuntu-latest
    needs: test
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: llm_access_gateway
          MYSQL_USER: user
          MYSQL_PASSWORD: pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uuser -ppass --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      APP_MYSQL_DSN: user:pass@tcp(127.0.0.1:3306)/llm_access_gateway?parseTime=true
      APP_REDIS_ADDRESS: 127.0.0.1:6379
      APP_SERVER_ADDRESS: 127.0.0.1:18080
      BASE_URL: http://127.0.0.1:18080
      API_KEY: lag-local-dev-key
      GATEWAY_BIN: /tmp/lag-gateway
      GOCACHE: /tmp/go-build
      GOMODCACHE: /tmp/go-mod
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Warm Go module cache
        run: |
          for attempt in 1 2 3; do
            if go mod download; then
              exit 0
            fi

            echo "go mod download failed on attempt ${attempt}; retrying." >&2
            sleep $((attempt * 2))
          done

          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build gateway binary
        run: go build -o "${GATEWAY_BIN}" ./cmd/gateway

      - name: Seed schema and dev key
        run: go run ./cmd/devinit

      - name: Start gateway for smoke verification
        run: |
          nohup "${GATEWAY_BIN}" >/tmp/gateway.log 2>&1 &
          echo $! >/tmp/gateway.pid

          for _ in $(seq 1 60); do
            if curl -fsS "${BASE_URL}/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/gateway.log
          exit 1

      - name: Run smoke checks and lightweight loadtests
        run: ASSERT=true ./scripts/gateway-smoke-check.sh

      - name: Stop smoke gateway and start synthetic upstream
        run: |
          if test -f /tmp/gateway.pid; then
            smoke_pid="$(cat /tmp/gateway.pid)"
            kill "${smoke_pid}" || true

            for _ in $(seq 1 30); do
              if ! kill -0 "${smoke_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if kill -0 "${smoke_pid}" 2>/dev/null; then
              kill -9 "${smoke_pid}" || true
              for _ in $(seq 1 5); do
                if ! kill -0 "${smoke_pid}" 2>/dev/null; then
                  break
                fi
                sleep 1
              done
            fi
          fi

          for _ in $(seq 1 30); do
            if ! curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
            echo "smoke gateway still serving ${BASE_URL} after shutdown" >&2
            test -f /tmp/gateway.log && cat /tmp/gateway.log || true
            exit 1
          fi

          nohup python3 ./scripts/synthetic-openai-upstream.py --port 18081 --mode error500 >/tmp/upstream.log 2>&1 &
          echo $! >/tmp/upstream.pid

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18081/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/upstream.log
          exit 1

      - name: Start gateway for fallback verification
        env:
          APP_GATEWAY_PROVIDER_PROBE_INTERVAL_SECONDS: "0"
          APP_PROVIDER_PRIMARY_TYPE: openai
          APP_PROVIDER_PRIMARY_NAME: openai-primary
          APP_PROVIDER_PRIMARY_BASE_URL: http://127.0.0.1:18081/v1
          APP_PROVIDER_PRIMARY_MODEL: gpt-4o-mini
          APP_PROVIDER_PRIMARY_TIMEOUT_SECONDS: "1"
          APP_PROVIDER_PRIMARY_MAX_RETRIES: "1"
          APP_PROVIDER_PRIMARY_RETRY_BACKOFF_MILLISECONDS: "200"
        run: |
          go run ./cmd/routerulectl sync-from-config
          nohup "${GATEWAY_BIN}" >/tmp/gateway-fallback.log 2>&1 &
          echo $! >/tmp/gateway.pid

          for _ in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/gateway.pid)" 2>/dev/null; then
              cat /tmp/gateway-fallback.log
              exit 1
            fi

            if curl -fsS "${BASE_URL}/healthz" >/dev/null 2>&1; then
              providers_json="$(curl -fsS "${BASE_URL}/debug/providers" 2>/dev/null || true)"
              if printf '%s' "${providers_json}" | grep -q '"name":"openai-primary"'; then
                printf '%s\n' "${providers_json}" >/tmp/fallback-start-providers.json
                exit 0
              fi
            fi

            if grep -q 'address already in use' /tmp/gateway-fallback.log; then
              cat /tmp/gateway-fallback.log
              exit 1
            fi

            sleep 1
          done

          cat /tmp/gateway-fallback.log
          test -f /tmp/fallback-start-providers.json && cat /tmp/fallback-start-providers.json || true
          exit 1
      - name: Run fallback drill
        run: ./scripts/provider-fallback-drill.sh create-fail | tee /tmp/fallback.out

      - name: Assert fallback result and degraded health
        run: |
          grep -q 'HTTP/1.1 200 OK' /tmp/fallback.out
          grep -q 'This is a mock response from LLM Access Gateway.' /tmp/fallback.out

          curl -fsS "${BASE_URL}/debug/providers" | tee /tmp/providers.json
          grep -Eq '"name":"openai-primary".*"healthy":false' /tmp/providers.json
          grep -Eq '"name":"secondary".*"healthy":true' /tmp/providers.json
          grep -q '"ready":true' /tmp/providers.json

      - name: Dump process logs on failure
        if: failure()
        run: |
          test -f /tmp/gateway.log && cat /tmp/gateway.log || true
          test -f /tmp/gateway-fallback.log && cat /tmp/gateway-fallback.log || true
          test -f /tmp/upstream.log && cat /tmp/upstream.log || true

      - name: Stop background processes
        if: always()
        run: |
          if test -f /tmp/gateway.pid; then
            gateway_pid="$(cat /tmp/gateway.pid)"
            kill "${gateway_pid}" || true
            for _ in $(seq 1 10); do
              if ! kill -0 "${gateway_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${gateway_pid}" 2>/dev/null || true
          fi

          if test -f /tmp/upstream.pid; then
            upstream_pid="$(cat /tmp/upstream.pid)"
            kill "${upstream_pid}" || true
            for _ in $(seq 1 10); do
              if ! kill -0 "${upstream_pid}" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            kill -9 "${upstream_pid}" 2>/dev/null || true
          fi
